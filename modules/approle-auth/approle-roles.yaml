# Approle source-of-truth
approle_roles:

  read-external:
    token_policies:
      - default
      - read-external

  read-ltc-infrastructure-ssl-certificates:
    token_policies:
      - default
      - read-ltc-infrastructure-ssl-certificates

token_ttl_seconds: 3600          # example: 1h
token_max_ttl_seconds: 86400     # example: 24h
secret_id_ttl_seconds: 120       # example: 2m

token_bound_cidrs:
- 10.12.0.0/16
- 10.42.0.0/16
- 10.67.0.0/16
- 142.232.0.0/16
- 192.68.68.0/24
