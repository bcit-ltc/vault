# Identity source-of-truth

entities:

  # special userpass account for ltc-admin
  ltc-admin:
    metadata: { team: LTC, note: "admin service user" }
    policies: []

  metrics-user:
    metadata: {}
    policies: [ admin-metrics ]

  kyle-hunter:
    metadata: {}
    policies: []

  arvin-rolos:
    metadata: {}
    policies: []

  viresh-soedhwa:
    metadata: {}
    policies: []

  diego-estevez-vilanova:
    metadata: {}
    policies: []

  jason-chien:
    metadata: {}
    policies: []

  lance-men:
    metadata: {}
    policies: []

  steven-zeng:
    metadata: {}
    policies: []

groups:
  course-production:
    type: internal
    metadata: { team: Course Production }
    policies: []
    members:
      entities: [ kyle-hunter, arvin-rolos, viresh-soedhwa ]
      groups:   []

  virtual-simulation-multimedia:
    type: internal
    metadata: { team: VSM }
    policies: []
    members:
      entities: [ jason-chien, lance-men, steven-zeng ]
      groups:   []

  educational-technology-services:
    type: internal
    metadata: { team: ETS }
    policies: []
    members:
      entities: [ diego-estevez-vilanova ]
      groups:   []

  ltc:
    type: internal
    metadata: { version: "2" }
    policies:
      - default
      - read-ltc-infrastructure-inventory
      - private-team    # allows access to private team resources
      - write-external
    members:
      entities: [ ltc-admin ]
      groups:   [ course-production, virtual-simulation-multimedia, educational-technology-services ]

  admin:
    type: internal
    metadata: { version: "2" }
    policies:
      - admin-approle
      - admin-apps
      - admin-external
      - admin-ltc-infrastructure
      - admin-kubernetes
      - admin-metrics
      - admin-research
      - admin-sops
      - admin-system
      - admin-tokens
      - admin-transit
      - write-userpass
    members:
      entities: [ ltc-admin ]
      groups:   [ course-production ]

# Alias Vault identities to auth backends (mount paths).
aliases:
  entities:
    - name: ltc-admin
      mount_path: userpass
      alias_name: ltc-admin
  groups: []
